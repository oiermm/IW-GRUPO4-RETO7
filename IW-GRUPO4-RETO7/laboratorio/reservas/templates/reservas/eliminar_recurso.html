{% extends 'reservas/base.html' %}

{% block title %}Eliminar Recurso{% endblock %}

{% block content %}

<h1>Eliminar recurso</h1>

<p>
    ¿Seguro que quieres eliminar el recurso
    <strong>{{ recurso.nombre }}</strong>?
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'lista_recursos' %}">Cancelar</a>
</form>

{% endblock %}
