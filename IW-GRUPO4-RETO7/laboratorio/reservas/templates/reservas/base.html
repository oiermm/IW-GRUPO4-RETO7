{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema de Reservas{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>

<body class="cuerpo-principal">

    <!-- HEADER -->
    <header class="header">
        <a href="{% url 'index' %}" class="link-logo">
            <h1 class="titulo-header">Sistema de Reservas</h1>
        </a>

        <section class="navegacion">
            <a href="{% url 'lista_usuarios' %}" class="botones">Usuarios</a>
            <a href="{% url 'lista_recursos' %}" class="botones">Recursos</a>
            <a href="{% url 'lista_reservas' %}" class="botones">Reservas</a>
        </section>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <article class="contenido-principal">
        {% block content %}
        {% endblock %}
    </article>

    <!-- FOOTER CON FORMULARIO -->
    <footer class="pie">

        <h3 class="mensaje-ayuda">¿Necesitas información sobre el laboratorio?</h3>

        <form class="form-contacto">
            <div class="fila-input">
                <div class="campo-input">
                    <label class="nombre_label">Nombre</label>
                    <input type="text" class="input-campo" placeholder="Tu nombre">
                </div>

                <div class="campo-input">
                    <label class="nombre_label">Email</label>
                    <input type="email" class="input-campo" placeholder="Tu email">
                </div>
            </div>

            <div class="campo-descripcion">
                <label class="nombre_label">Consulta</label>
                <textarea class="textarea-proyecto" rows="4" placeholder="Escribe tu mensaje..."></textarea>
            </div>

            <button type="submit" class="boton-enviar">Enviar</button>
        </form>

        <div class="contacto-info">
            <p class="info-telefono">📞 Teléfono: +34 600 123 456</p>
            <p>📧 Email: soporte@laboratorio.com</p>
        </div>

    </footer>

</body>

</html>
